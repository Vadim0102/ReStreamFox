# Example watchdog config — copy to config.yml and edit
mediamtx_api: "http://mediamtx:9997"
path_name: "live"
check_interval: 5
backup:
  enabled: true
  file: "/data/offline.mp4"
ffmpeg:
  video_bitrate: "2500k"
  audio_bitrate: "128k"
  resolution: "1280x720"
  vcodec: "libx264"
  acodec: "aac"
ui:
  admin_password: "change_me"
  admin_token: "changeme-token"
  secret: "change_me_secret"
outputs_file: "/outputs/outputs.txt"
