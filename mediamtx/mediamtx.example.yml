logLevel: info

# Активация REST API для мониторинга потоков службами Watchdog и UI
api: yes
apiAddress: :9997

# Конфигурация аутентификации (Новый формат MediaMTX v1.4+)
authMethod: internal
authInternalUsers:
  # 1. Авторизованный стример. Требует ввода логина и пароля/стрим-ключа.
  # Разрешает публикацию входящего потока ТОЛЬКО на путь "live".
  - user: streamer
    pass: secure_ingest_key_here
    ips: []
    permissions:
      - action: publish
        path: live

  # 2. Гостевой доступ без пароля.
  # Разрешает внутреннему FFmpeg и внешним плеерам читать поток,
  # а также открывает доступ к API и метрикам для служб Watchdog и UI.
  - user: any
    pass:
    ips: []
    permissions:
      - action: read
        path: live
      - action: playback
        path: live
      - action: read
        path: transcoded
      - action: playback
        path: transcoded
      - action: api
      - action: metrics
      - action: pprof

srt: yes
srtAddress: :8890

rtmp: yes

rtsp: yes

webrtc: yes

paths:
  live:
    # Бесшовное удержание потока: если стример не вещает, проигрывается видеофайл
    alwaysAvailable: yes
    alwaysAvailableFile: /data/offline.mp4
  transcoded:
