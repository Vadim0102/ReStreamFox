logLevel: info

# Активация REST API для мониторинга потоков службами Watchdog и UI
api: yes
apiAddress: :9997

# Конфигурация аутентификации (разрешаем локальным службам доступ к API)
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

srt: yes
srtAddress: :8890

rtmp: yes

rtsp: yes

webrtc: yes

paths:
  live:
    # Защита входящего потока (Авторизация / Стрим-ключ для OBS)
    # Только отправитель, указавший эти данные, сможет опубликовать поток.
    # Скопируйте этот файл в mediamtx.yml и измените параметры на свои!
    publishUser: "streamer"
    publishPass: "secure_ingest_key_here"
