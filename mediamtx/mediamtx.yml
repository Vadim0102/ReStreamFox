logLevel: info

# Активация REST API для мониторинга потоков службами Watchdog и UI
api: yes
apiAddress: :9997

# Конфигурация аутентификации (разрешаем анонимным клиентам доступ к API)
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

srt: yes
srtAddress: :8890

rtmp: yes

rtsp: yes

webrtc: yes

paths:
  live:
