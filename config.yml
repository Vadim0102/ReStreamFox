mediamtx_api: http://mediamtx:9997/v3/paths/list
path_name: live
check_interval: 1

backup:
  enabled: true
  file: /app/offline.mp4

ffmpeg:
  video:
    codec: libx264
    bitrate: 6000k
    preset: veryfast
    tune: zerolatency
  audio:
    codec: aac
    bitrate: 192k

# UI admin token: set a strong random string. Required for REST restart when Docker socket exposed.
ui_admin_token: "REPLACE_WITH_STRONG_TOKEN"
ui_admin_password: "changeme"
ui_secret: "change_this_secret"
