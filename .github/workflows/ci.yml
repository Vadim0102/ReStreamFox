name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install watchdog deps
        run: |
          python -m pip install --upgrade pip
          pip install -r watchdog/requirements.txt
      - name: Syntax check
        run: |
          python -m py_compile watchdog/watchdog.py || true

  docker-build:
    runs-on: ubuntu-latest
    needs: python-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build ffmpeg image
        uses: docker/build-push-action@v5
        with:
          context: ./ffmpeg
          file: ./ffmpeg/Dockerfile
          push: false
          tags: restreamfox/ffmpeg:ci
          build-args: |
            PYTHONUNBUFFERED=1
      - name: Build watchdog image
        uses: docker/build-push-action@v5
        with:
          context: ./watchdog
          file: ./watchdog/Dockerfile
          push: false
          tags: restreamfox/watchdog:ci
          build-args: |
            PYTHONUNBUFFERED=1
      - name: Build ui image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: false
          tags: restreamfox/ui:ci
          build-args: |
            PYTHONUNBUFFERED=1
